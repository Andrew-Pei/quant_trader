# 量化交易系统配置文件

# 数据配置
data:
  source: akshare  # 数据源
  save_path: ./data  # 数据缓存路径
  
# 策略配置
strategy:
  name: ma_cross  # 默认策略: ma_cross(双均线), rsi(RSI策略)
  params:
    # 双均线策略参数
    short_window: 5   # 短期均线周期
    long_window: 20   # 长期均线周期
    # RSI策略参数
    rsi_period: 14    # RSI周期
    rsi_oversold: 30  # 超卖阈值
    rsi_overbought: 70 # 超买阈值

# 回测配置
backtest:
  initial_capital: 100000  # 初始资金
  commission_rate: 0.0003  # 手续费率 (万分之三)
  slippage: 0.001  # 滑点
  position_size: 0.9  # 仓位比例 (使用90%资金)

# 风险管理
risk:
  stop_loss: 0.05   # 止损比例 5%
  stop_profit: 0.15 # 止盈比例 15%
  max_position: 0.3 # 单只股票最大仓位 30%

# 股票池 - 涵盖各行业
stocks:
  # 银行业
  - "000001"  # 平安银行
  # 食品饮料
  - "000858"  # 五粮液
  # 保险业
  - "601318"  # 中国平安
  # 家电制造
  - "000333"  # 美的集团
  # 房地产
  - "000002"  # 万科A
  # 医药生物
  - "000661"  # 长春高新
  # 石油石化
  - "600028"  # 中国石化
  # 汽车制造
  - "000625"  # 长安汽车
  # 钢铁行业
  - "000898"  # 鞍钢股份
  # 有色金属
  - "000831"  # 五矿稀土
  # 电力行业
  - "600886"  # 国投电力
  # 交通运输
  - "600018"  # 上港集团

# 日期配置 - 多年份数据
date:
  start_date: "20200101"
  end_date: "20240101"
